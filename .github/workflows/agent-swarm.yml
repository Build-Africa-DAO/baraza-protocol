name: Agent Swarm Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, dev]

# Cancel in-progress runs on new pushes to the same PR
concurrency:
  group: swarm-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  swarm:
    name: ${{ matrix.agent }} agent
    runs-on: ubuntu-latest
    strategy:
      matrix:
        agent: [seo, design, security, code]
      fail-fast: false
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        run: gh pr diff ${{ github.event.pull_request.number }} > /tmp/pr.diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Run ${{ matrix.agent }} agent
        run: node scripts/agents/review.mjs ${{ matrix.agent }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          AGENT: ${{ matrix.agent }}
