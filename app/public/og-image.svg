    <path d="M16 28 L26 38 L40 22" stroke="#F4D06F" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="76" y="38" font-family="'Hanken Grotesk', 'Inter', sans-serif" font-size="26" font-weight="700" fill="#F4D06F" letter-spacing="0.5">Baraza Protocol</text>
