<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0d0a"/>
      <stop offset="100%" stop-color="#13180f"/>
    </linearGradient>
    <linearGradient id="warm" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F4D06F"/>
      <stop offset="100%" stop-color="#FF8811"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.78" cy="0.18" r="0.65">
      <stop offset="0%" stop-color="#FF8811" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FF8811" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#F4D06F" fill-opacity="0.08"/>
