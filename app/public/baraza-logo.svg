<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Baraza logo</title>
  <desc id="desc">Three connected community nodes with a gold fund marker.</desc>
  <defs>
    <linearGradient id="logo-grad" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8ECAE6" />
      <stop offset="100%" stop-color="#219EBC" />
    </linearGradient>
    <linearGradient id="node-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFB703" />
      <stop offset="100%" stop-color="#FB8500" />
    </linearGradient>
  </defs>
  <rect width="40" height="40" rx="10" fill="url(#logo-grad)" />
  <line x1="20" y1="13" x2="13" y2="26" stroke="white" stroke-width="1.5" stroke-opacity="0.5" />
  <line x1="20" y1="13" x2="27" y2="26" stroke="white" stroke-width="1.5" stroke-opacity="0.5" />
  <line x1="13" y1="26" x2="27" y2="26" stroke="white" stroke-width="1.5" stroke-opacity="0.5" />
  <circle cx="20" cy="12" r="4.5" fill="white" />
  <circle cx="12" cy="27" r="3.5" fill="white" fill-opacity="0.85" />
  <circle cx="28" cy="27" r="3.5" fill="white" fill-opacity="0.85" />
  <circle cx="20" cy="22" r="2" fill="url(#node-grad)" />
</svg>
