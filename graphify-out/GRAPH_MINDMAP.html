<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>baraza-protocol — graphify mind map</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      margin: 0; padding: 0;
      background: #f4f6f9;
      color: #333;
    }
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 24px 8px;
      background: #1e3a56;
      color: #fff;
      box-shadow: 0 2px 6px rgba(0,0,0,.25);
    }
    header h1 {
      margin: 0;
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: .02em;
      flex: 1;
    }
    .pill {
      background: rgba(255,255,255,.15);
      border: 1px solid rgba(255,255,255,.3);
      color: #fff;
      padding: 5px 14px;
      border-radius: 20px;
      font-size: .82rem;
      cursor: pointer;
      transition: background .18s;
      white-space: nowrap;
    }
    .pill:hover { background: rgba(255,255,255,.28); }
    #map-container {
      width: 100vw;
      height: calc(100vh - 56px);
      overflow: hidden;
      cursor: grab;
    }
    #map-container:active { cursor: grabbing; }
    svg {
      display: block;
      width: 100%;
      height: 100%;
    }
    .node circle {
      stroke-width: 2px;
      transition: r .2s;
    }
    .node circle:hover { r: 11px; }
    .node text {
      font: 12px 'Segoe UI', Arial, sans-serif;
      paint-order: stroke fill;
      stroke: rgba(255,255,255,.85);
      stroke-width: 3px;
      stroke-linejoin: round;
      fill: #222;
      pointer-events: none;
    }
    .link {
      fill: none;
      stroke-opacity: .55;
      stroke-width: 1.6px;
    }
    .tooltip {
      position: fixed;
      background: rgba(30,58,86,.92);
      color: #fff;
      padding: 5px 10px;
      border-radius: 6px;
      font-size: .78rem;
      pointer-events: none;
      white-space: nowrap;
      display: none;
      z-index: 9999;
    }
  </style>
</head>

    // ── colour palette (mirrors tree_html) ─────────────────────────
    const PALETTE = [
      ["#3498DB","#2980B9"],["#2ECC71","#27AE60"],["#E74C3C","#C0392B"],
      ["#9B59B6","#8E44AD"],["#F39C12","#D68910"],["#1ABC9C","#117864"],
      ["#34495E","#1B2631"],["#E67E22","#BA4A00"],["#16A085","#0E6655"],
      ["#D35400","#A04000"],["#7F8C8D","#566573"],["#C0392B","#7B241C"],
      ["#2E86C1","#1B4F72"],["#28B463","#196F3D"],["#AF7AC5","#6C3483"],
    ];
    const phaseColors = {};
    (RAW.children || []).forEach((c, i) => {
      const pal = PALETTE[i % PALETTE.length];
      phaseColors[c.name] = { fill: pal[0], stroke: pal[1] };
    });
    const DEPTH_COLORS = [
      { fill: "#1e3a56", stroke: "#0d2235" },  // depth 0 — root
      null,                                         // depth 1 — from phaseColors
      { fill: "#6ab04c", stroke: "#508a38" },
      { fill: "#f0932b", stroke: "#d0730f" },
      { fill: "#be2edd", stroke: "#a01cb3" },
      { fill: "#00a8ff", stroke: "#007ac1" },
      { fill: "#e55039", stroke: "#c23620" },
    ];
    const DEFAULT_COLOR = { fill: "#747d8c", stroke: "#57606f" };

    function nodeColor(d) {
      if (d.depth === 0) return DEPTH_COLORS[0];
      if (d.depth === 1) return phaseColors[d.data.name] || DEFAULT_COLOR;
      return DEPTH_COLORS[d.depth] || DEFAULT_COLOR;
    }

    // ── layout helpers ─────────────────────────────────────────────
    const svg    = d3.select("#mindmap-svg");
    const gMain  = svg.append("g").attr("class", "main-g");
    const gLinks = gMain.append("g").attr("class", "links");
    const gNodes = gMain.append("g").attr("class", "nodes");

    const tooltip = document.getElementById("tooltip");

    let W = svg.node().clientWidth  || window.innerWidth;
    let H = svg.node().clientHeight || (window.innerHeight - 56);

    // zoom
    const zoom = d3.zoom().scaleExtent([.1, 8]).on("zoom", e => {
      gMain.attr("transform", e.transform);
    });
    svg.call(zoom);

    const duration = 450;
    let uid = 0;

    // Build initial D3 hierarchy
    let root = d3.hierarchy(RAW, d => d.children);
    root.x0 = 0; root.y0 = 0;

    // Collapse all depth-1 children initially
    (root.children || []).forEach(child => {
      if (child.children) collapseBranch(child);
    });

    function collapseBranch(d) {
      if (d.children) {
        d._children = d.children;
        d._children.forEach(collapseBranch);
        d.children = null;
      }
    }
    function expandBranch(d) {
      if (d._children) { d.children = d._children; d._children = null; }
      if (d.children) d.children.forEach(expandBranch);
    }

    window.expandAll  = () => { expandBranch(root); update(root); };
    window.collapseAll = () => {
      (root.children || []).forEach(collapseBranch);
      update(root);
    };
    window.resetView = () => {
      svg.transition().duration(duration)
        .call(zoom.transform, d3.zoomIdentity);
      collapseAll();
    };

    // ── radial layout ──────────────────────────────────────────────
    function makeLayout() {
      W = svg.node().clientWidth  || window.innerWidth;
      H = svg.node().clientHeight || (window.innerHeight - 56);
      const nLeaves = root.leaves().length;
      // radius grows with leaf count so nodes don't overlap on large graphs
      const radius  = Math.max(220, Math.min(Math.sqrt(nLeaves) * 55, 1200));
      return {
        layout: d3.cluster().size([2 * Math.PI, radius]),
        radius,
      };
    }

    // link path in radial coordinates
    function radialLink(d) {
      return d3.linkRadial()
        .angle(n  => n.x)
        .radius(n => n.y)(d);
    }

    // polar → cartesian
    function px(d) { return d.y * Math.cos(d.x - Math.PI / 2); }
    function py(d) { return d.y * Math.sin(d.x - Math.PI / 2); }

    function update(source) {
      const { layout, radius } = makeLayout();
      layout(root);

      const nodes = root.descendants();
      const links = root.links();

      // Centre the view on the root node
      gMain.attr("transform", `translate(${W / 2},${H / 2})`);

      // ── links ────────────────────────────────────────────────────
      const link = gLinks.selectAll("path.link")
        .data(links, d => d.target.data._uid || (d.target.data._uid = ++uid));

      const linkEnter = link.enter().append("path")
        .attr("class", "link")
        .attr("d", () => {
          const o = { x: source.x0 ?? 0, y: source.y0 ?? 0 };
          return radialLink({ source: o, target: o });
        })
        .style("stroke", d => {
          let n = d.target;
          while (n.depth > 1 && n.parent) n = n.parent;
          return (phaseColors[n.data.name] || DEFAULT_COLOR).stroke;
        });

      linkEnter.merge(link).transition().duration(duration)
        .attr("d", radialLink);

      link.exit().transition().duration(duration)
        .attr("d", () => {
          const o = { x: source.x ?? 0, y: source.y ?? 0 };
          return radialLink({ source: o, target: o });
        })
        .remove();

      // ── nodes ────────────────────────────────────────────────────
      const node = gNodes.selectAll("g.node")
        .data(nodes, d => d.data._uid || (d.data._uid = ++uid));

      const nodeEnter = node.enter().append("g")
        .attr("class", "node")
        .attr("transform", () => `translate(${px({ x: source.x0 ?? 0, y: source.y0 ?? 0 })}, ${py({ x: source.x0 ?? 0, y: source.y0 ?? 0 })})`)
        .style("cursor", d => (d.children || d._children) ? "pointer" : "default")
        .on("click", (event, d) => {
          if (d.children) { d._children = d.children; d.children = null; }
          else if (d._children) { d.children = d._children; d._children = null; }
          update(d);
        })
        .on("mouseover", (event, d) => {
          const count = d.data.total_count;
          tooltip.style.display = "block";
          tooltip.textContent = count != null
            ? `${d.data.name}  (nodes: ${count})`
            : d.data.name;
        })
        .on("mousemove", event => {
          tooltip.style.left = (event.clientX + 12) + "px";
          tooltip.style.top  = (event.clientY - 8)  + "px";
        })
        .on("mouseout", () => { tooltip.style.display = "none"; });

      nodeEnter.append("circle").attr("r", 0);

      nodeEnter.append("text")
        .attr("dy", "0.32em")
        .style("fill-opacity", 0);

      // merge enter + update
      const nodeAll = nodeEnter.merge(node);

      nodeAll.transition().duration(duration)
        .attr("transform", d => `translate(${px(d)},${py(d)})`);

      nodeAll.select("circle")
        .transition().duration(duration)
        .attr("r", d => d.depth === 0 ? 12 : d.children || d._children ? 8 : 5)
        .style("fill", d => {
          const c = nodeColor(d);
          if (d.depth === 0) return c.fill;
          return d._children ? c.fill + "aa" : d.children ? c.fill : "#fff";
        })
        .style("stroke", d => nodeColor(d).stroke);

      nodeAll.select("text")
        .transition().duration(duration)
        .style("fill-opacity", 1)
        .attr("text-anchor", d => {
          if (d.depth === 0) return "middle";
          return (d.x < Math.PI) ? "start" : "end";
        })
        .attr("transform", d => {
          if (d.depth === 0) return "translate(0,-18)";
          const flip = d.x >= Math.PI;
          return `rotate(${(d.x * 180 / Math.PI - 90) * (flip ? -1 : 1)}) translate(${(d.children || d._children ? -12 : 10) * (flip ? -1 : 1)},0) rotate(${flip ? 180 : 0})`;
        })
        .text(d => {
          const label = d.data.name || "";
          return label.length > 30 ? label.slice(0, 28) + "…" : label;
        })
        .style("font-size", d => d.depth === 0 ? "14px" : d.depth === 1 ? "12px" : "11px")
        .style("font-weight", d => d.depth <= 1 ? "600" : "normal");

      node.exit().transition().duration(duration)
        .attr("transform", () => `translate(${px(source)},${py(source)})`)
        .remove()
        .select("circle").attr("r", 0);

      nodes.forEach(d => { d.x0 = d.x; d.y0 = d.y; });

      // Auto-fit to view on first call
      if (!update._fitted) {
        update._fitted = true;
        const bbox = gMain.node().getBBox();
        if (bbox.width > 0 && bbox.height > 0) {
          const scale = Math.min(.85 * W / bbox.width, .85 * H / bbox.height, 1);
          const tx = W / 2 - scale * (bbox.x + bbox.width  / 2);
          const ty = H / 2 - scale * (bbox.y + bbox.height / 2);
          svg.call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
        }
      }
    }

    update(root);
    window.addEventListener("resize", () => update(root));
